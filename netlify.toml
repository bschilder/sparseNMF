# Netlify build config for the sparseNMF docs site.
#
# Netlify auto-detects JS frameworks (Next, Astro, Vite, …) but
# doesn't sniff Sphinx, so we spell the Python build out here.
#
# Build flow: install CPU torch (saves ~1.8 GB vs the default CUDA
# wheel pip would pull from PyPI), install the package + its
# ``[docs]`` extras, run sphinx-build, publish ``docs/_build/html``.
# Notebooks under docs/notebooks/ ship with their outputs already
# baked in (see scripts/build_notebooks.py) so the build doesn't
# need a notebook kernel here.

[build]
  publish = "docs/_build/html"
  command = """
    python -m pip install --upgrade pip && \
    pip install --index-url https://download.pytorch.org/whl/cpu torch && \
    pip install -e ".[docs]" && \
    sphinx-build --keep-going -b html docs docs/_build/html
  """

[build.environment]
  PYTHON_VERSION = "3.11"
  # Suppress the "you should consider upgrading pip" banner — we
  # already upgrade it in the build command and the warning bloats
  # the deploy log.
  PIP_DISABLE_PIP_VERSION_CHECK = "1"

# Deploy previews for every PR — the killer feature vs GH Pages.
# Each PR gets a unique URL like
# ``deploy-preview-12--<site>.netlify.app`` posted as a check on
# the PR so reviewers can see rendered docs before merging.
[context.deploy-preview]
  command = """
    python -m pip install --upgrade pip && \
    pip install --index-url https://download.pytorch.org/whl/cpu torch && \
    pip install -e ".[docs]" && \
    sphinx-build --keep-going -b html docs docs/_build/html
  """

# Per-branch deploys. Each non-main branch gets its own URL — handy
# when iterating on a long-running doc rewrite without churning the
# main canonical site.
[context.branch-deploy]
  command = """
    python -m pip install --upgrade pip && \
    pip install --index-url https://download.pytorch.org/whl/cpu torch && \
    pip install -e ".[docs]" && \
    sphinx-build --keep-going -b html docs docs/_build/html
  """

# Production headers — keep the served HTML cacheable but not stale
# (CDN re-validates against the origin once an hour).
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/_static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
