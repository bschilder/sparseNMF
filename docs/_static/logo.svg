<?xml version="1.0" encoding="UTF-8"?>
<!--
  sparseNMF logo.

  Visual: a sparse 6×6 grid (the input matrix) on the left, an "≈"
  separator, then two narrower factor matrices — the decomposition
  X ≈ W·H without the explicit X/W/H labels. Filled cells use a
  teal→violet gradient that echoes a viridis colormap; empty cells
  are translucent so the "sparse" nature is immediate.

  Designed to read at small sizes (favicon-friendly) — the matrix
  shapes stay legible down to ~24px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 250" role="img" aria-label="sparseNMF logo">
  <defs>
    <linearGradient id="cellGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1abc9c"/>
      <stop offset="100%" stop-color="#7d3c98"/>
    </linearGradient>
    <linearGradient id="factorGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#3498db"/>
      <stop offset="100%" stop-color="#7d3c98"/>
    </linearGradient>
    <linearGradient id="wordGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="#2c3e50"/>
      <stop offset="60%" stop-color="#2c3e50"/>
      <stop offset="100%" stop-color="#7d3c98"/>
    </linearGradient>
    <style>
      /* White outlines on all visible elements — provides contrast
         against the dark header strip the logo sits on (the docs
         site uses ``style_nav_header_background: #0d1117``). For
         text we use ``paint-order: stroke fill`` so the stroke
         renders BEHIND the gradient fill (otherwise the white would
         eat into the colored letterforms). For rect shapes the
         stroke renders symmetrically across the edge — 2-3px is
         a balanced "thick-ish" weight against 20x20 cells. */
      .cell {
        fill: url(#cellGrad);
        stroke: #ffffff;
        stroke-width: 2;
      }
      .empty {
        fill: #2c3e50;
        opacity: 0.18;
        stroke: #ffffff;
        stroke-width: 2;
        stroke-opacity: 0.6;
      }
      .factor {
        fill: url(#factorGrad);
        opacity: 0.85;
        stroke: #ffffff;
        stroke-width: 2;
      }
      .op {
        font-family: 'Geist','Manrope','Inter',ui-sans-serif,system-ui,sans-serif;
        font-weight: 600;
        font-size: 22px;
        fill: #2c3e50;
        stroke: #ffffff;
        stroke-width: 4;
        paint-order: stroke fill;
      }
      .wordmark {
        font-family: 'Geist','Manrope','Inter',ui-sans-serif,system-ui,sans-serif;
        font-weight: 700;
        font-size: 56px;
        letter-spacing: -0.025em;
        fill: url(#wordGrad);
        stroke: #ffffff;
        stroke-width: 8;
        paint-order: stroke fill;
      }
    </style>
  </defs>

  <!-- X (sparse 6x6 input matrix) -->
  <g transform="translate(20,30)">
    <!-- empty cells -->
    <g class="empty">
      <rect x="0"  y="0"  width="20" height="20"/><rect x="22" y="0"  width="20" height="20"/>
      <rect x="44" y="0"  width="20" height="20"/><rect x="88" y="0"  width="20" height="20"/>
      <rect x="0"  y="22" width="20" height="20"/><rect x="44" y="22" width="20" height="20"/>
      <rect x="66" y="22" width="20" height="20"/><rect x="88" y="22" width="20" height="20"/>
      <rect x="22" y="44" width="20" height="20"/><rect x="44" y="44" width="20" height="20"/>
      <rect x="88" y="44" width="20" height="20"/>
      <rect x="0"  y="66" width="20" height="20"/><rect x="22" y="66" width="20" height="20"/>
      <rect x="66" y="66" width="20" height="20"/>
      <rect x="22" y="88" width="20" height="20"/><rect x="66" y="88" width="20" height="20"/>
      <rect x="88" y="88" width="20" height="20"/>
      <rect x="0"  y="110" width="20" height="20"/><rect x="44" y="110" width="20" height="20"/>
      <rect x="88" y="110" width="20" height="20"/>
    </g>
    <!-- non-zero cells -->
    <g class="cell">
      <rect x="22" y="0"   width="20" height="20" opacity="0.95"/>
      <rect x="66" y="0"   width="20" height="20" opacity="0.7"/>
      <rect x="110" y="0"  width="20" height="20" opacity="0.55"/>
      <rect x="22" y="22"  width="20" height="20" opacity="0.85"/>
      <rect x="110" y="22" width="20" height="20" opacity="0.35"/>
      <rect x="0"  y="44"  width="20" height="20" opacity="0.95"/>
      <rect x="66" y="44"  width="20" height="20" opacity="0.6"/>
      <rect x="110" y="44" width="20" height="20" opacity="0.7"/>
      <rect x="44" y="66"  width="20" height="20" opacity="0.85"/>
      <rect x="88" y="66"  width="20" height="20" opacity="0.5"/>
      <rect x="110" y="66" width="20" height="20" opacity="0.4"/>
      <rect x="0"  y="88"  width="20" height="20" opacity="0.55"/>
      <rect x="44" y="88"  width="20" height="20" opacity="0.95"/>
      <rect x="110" y="88" width="20" height="20" opacity="0.7"/>
      <rect x="22" y="110" width="20" height="20" opacity="0.85"/>
      <rect x="66" y="110" width="20" height="20" opacity="0.6"/>
      <rect x="110" y="110" width="20" height="20" opacity="0.5"/>
    </g>
  </g>

  <!-- ≈ -->
  <text x="180" y="100" class="op" text-anchor="middle">≈</text>

  <!-- W (tall, narrow) -->
  <g transform="translate(210,30)">
    <rect class="factor" x="0"  y="0" width="20" height="130" rx="2"/>
    <rect class="factor" x="22" y="0" width="20" height="130" rx="2" opacity="0.7"/>
    <rect class="factor" x="44" y="0" width="20" height="130" rx="2" opacity="0.4"/>
  </g>

  <!-- · -->
  <text x="298" y="100" class="op" text-anchor="middle">·</text>

  <!-- H (wide, short) -->
  <g transform="translate(320,55)">
    <rect class="factor" x="0"  y="0"  width="130" height="20" rx="2"/>
    <rect class="factor" x="0"  y="22" width="130" height="20" rx="2" opacity="0.7"/>
    <rect class="factor" x="0"  y="44" width="130" height="20" rx="2" opacity="0.4"/>
  </g>

  <!-- wordmark -->
  <text x="260" y="225" text-anchor="middle" class="wordmark">sparseNMF</text>
</svg>
