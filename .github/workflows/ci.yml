name: CI

# Lint + multi-version pytest + self-hosted coverage badge.
# Coverage badge is generated in-tree as ``coverage.svg`` and committed
# back to ``main`` on push events; no third-party service or token
# required. Pattern mirrors standardmodelbio/protoforge and ADNI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    permissions:
      # ``contents: write`` is required for the coverage-badge auto-commit
      # step on push to main. PR runs don't need it (skipped via ``if``)
      # but elevating the matrix job is simpler than splitting it.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[test]"
      - run: pytest --cov=sparse_nmf --cov-report=xml --cov-report=term

      - name: Generate coverage badge
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: tj-actions/coverage-badge-py@v2
        with:
          output: coverage.svg

      - name: Verify coverage badge changed
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        uses: tj-actions/verify-changed-files@v20
        id: verify-changed-files
        with:
          files: coverage.svg

      - name: Commit & push updated coverage badge
        if: |
          matrix.python == '3.11' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          # ``[skip ci]`` in the commit message prevents the auto-commit
          # from re-triggering this same workflow (infinite loop
          # otherwise — every CI run produces a new SVG, every new SVG
          # triggers a new run).
          COMMIT_MSG: "chore(ci): update coverage.svg [skip ci]"
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add coverage.svg
          git commit -m "$COMMIT_MSG"
          git push
