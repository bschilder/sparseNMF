name: CI

# Lint + multi-version pytest + self-hosted coverage badge.
# Coverage badge is generated in-tree as ``coverage.svg`` and committed
# back to ``main`` on push events; no third-party service or token
# required. Pattern mirrors standardmodelbio/protoforge and ADNI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    permissions:
      # ``contents: write`` is required for the coverage-badge auto-commit
      # step on push to main. PR runs don't need it (skipped via ``if``)
      # but elevating the matrix job is simpler than splitting it.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[test]"
      - run: pytest --cov=sparse_nmf --cov-report=xml --cov-report=term

      # Self-hosted coverage badge (no third-party service): generate
      # ``coverage.svg`` from the .coverage file produced by pytest-cov,
      # commit it back to ``main`` only if it actually changed. The
      # ``coverage-badge`` package is pure-Python and works on every
      # Python version (the previous tj-actions/coverage-badge-py
      # action depended on ``pkg_resources`` which is removed in
      # py3.12+).
      - name: Generate coverage badge
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: coverage-badge -f -o coverage.svg

      - name: Commit coverage badge if changed
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          # ``[skip ci]`` in the commit message prevents the auto-commit
          # from re-triggering this same workflow (infinite loop
          # otherwise — every CI run produces a new SVG, every new SVG
          # triggers a new run).
          COMMIT_MSG: "chore(ci): update coverage.svg [skip ci]"
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if git diff --quiet coverage.svg 2>/dev/null && git ls-files --error-unmatch coverage.svg >/dev/null 2>&1; then
            echo "coverage.svg unchanged — skipping commit"
            exit 0
          fi
          git add coverage.svg
          if git diff --cached --quiet; then
            echo "no diff to commit"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push
