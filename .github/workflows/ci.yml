name: CI

# Lint + multi-version pytest + self-hosted coverage badge.
# Coverage badge is generated as ``docs/_static/coverage.svg`` and
# committed back to ``main`` on push events. Living under
# ``docs/_static/`` means Netlify publishes it at
# ``https://sparsenmf.netlify.app/_static/coverage.svg`` — a public
# URL that works even though the source repo is still private (raw
# GitHub blob URLs require auth on private repos and would 404 in
# the README badge for anonymous viewers). Pattern mirrors
# standardmodelbio/protoforge and ADNI; the Netlify hosting trick is
# what makes it work pre-public.

on:
  push:
    branches: [main]
    # The badge auto-commit step below pushes a new
    # ``docs/_static/coverage.svg`` after every CI run. If we let
    # those re-trigger CI, we get an infinite loop. Skip via
    # ``paths-ignore`` rather than a commit-message marker so the
    # *Docs* workflow (which we DO want to fire on the auto-commit
    # so the deployed badge refreshes) still runs.
    paths-ignore:
      - 'docs/_static/coverage.svg'
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - run: ruff check .
      - run: ruff format --check .

  test:
    name: Test (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12"]
    permissions:
      # ``contents: write`` is required for the coverage-badge auto-commit
      # step on push to main. PR runs don't need it (skipped via ``if``)
      # but elevating the matrix job is simpler than splitting it.
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[test]"
      - run: pytest --cov=sparse_nmf --cov-report=xml --cov-report=term

      # Self-hosted coverage badge (no third-party service): generate
      # ``coverage.svg`` from the .coverage file produced by pytest-cov,
      # commit it back to ``main`` only if it actually changed. The
      # ``coverage-badge`` package is pure-Python and works on every
      # Python version (the previous tj-actions/coverage-badge-py
      # action depended on ``pkg_resources`` which is removed in
      # py3.12+).
      - name: Generate coverage badge
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: coverage-badge -f -o docs/_static/coverage.svg

      - name: Commit coverage badge if changed
        if: ${{ matrix.python == '3.11' && github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        env:
          # No ``[skip ci]`` / ``[skip actions]`` marker — the
          # workflow-level ``paths-ignore`` on docs/_static/coverage.svg
          # already prevents this commit from re-triggering CI. The
          # Docs workflow has no such ignore (and we WANT it to fire
          # so the published badge URL refreshes), which a commit-
          # message skip would also block.
          COMMIT_MSG: "chore(ci): update coverage.svg"
        run: |
          set -euo pipefail
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          BADGE=docs/_static/coverage.svg
          if git diff --quiet "$BADGE" 2>/dev/null && git ls-files --error-unmatch "$BADGE" >/dev/null 2>&1; then
            echo "$BADGE unchanged — skipping commit"
            exit 0
          fi
          git add "$BADGE"
          if git diff --cached --quiet; then
            echo "no diff to commit"
            exit 0
          fi
          git commit -m "$COMMIT_MSG"
          git push
