name: Docs

# Builds the Sphinx docs site on every push to main and deploys to
# GitHub Pages. Visual styling is the canonical sphinx_rtd_theme —
# byte-equivalent to readthedocs.io (Lato body, Roboto Slab headings,
# Inconsolata code, gray sidebar with blue accent). Notebooks under
# docs/notebooks/ are rendered via myst_nb with their pre-baked
# outputs.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: |
          python -m pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -e ".[docs]"
      - run: sphinx-build -W --keep-going -b html docs docs/_build/html
      - run: touch docs/_build/html/.nojekyll
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
