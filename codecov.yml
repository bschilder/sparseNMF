coverage:
  status:
    project:
      default:
        # 80% target; CI fails if a PR drops coverage by more than 1%
        # against the project baseline.
        target: 80%
        threshold: 1%
        if_ci_failed: ignore
    patch:
      default:
        # New code in a PR should hit 80% to keep the project trending up.
        target: 80%
        threshold: 5%
        if_ci_failed: ignore

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true
